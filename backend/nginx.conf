# ─── Nginx — production config for ENEM IA backend ───────────────────────────
#
# Single-server setup (1 Droplet):
#   PM2 cluster handles load balancing internally on port 3333.
#   Nginx terminates TLS, enforces HTTP/2, and adds DDoS rate limiting.
#
# Multi-server setup (horizontal scale):
#   Uncomment the upstream block and point each server_addr to a different host.
#   All hosts must share the same REDIS_URL so rate limiting and sessions stay
#   consistent across instances.
#
# Deploy:
#   sudo cp backend/nginx.conf /etc/nginx/sites-available/enem-backend
#   sudo ln -sf /etc/nginx/sites-available/enem-backend /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ─── Rate limiting zones (DDoS / brute-force) ────────────────────────────────
# Applied at Nginx level before requests hit Node — zero cost when blocked.
limit_req_zone $binary_remote_addr zone=api_global:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m      rate=10r/m;
limit_req_zone $binary_remote_addr zone=correction:10m rate=20r/m;
limit_conn_zone $binary_remote_addr zone=per_ip:10m;

# ─── Upstream (single-server: PM2 on localhost) ───────────────────────────────
upstream enem_backend {
    # PM2 cluster listens on one port; OS kernel balances across workers.
    server 127.0.0.1:3333;

    # ── Multi-server: uncomment and add each app server ──
    # server 10.0.0.1:3333 weight=1 max_fails=3 fail_timeout=30s;
    # server 10.0.0.2:3333 weight=1 max_fails=3 fail_timeout=30s;
    # server 10.0.0.3:3333 weight=1 max_fails=3 fail_timeout=30s;

    keepalive 32;           # persistent connections to Node (avoids TCP handshake per request)
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.enemredacoes.app;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ─── HTTPS / API ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.enemredacoes.app;

    # TLS — managed by Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/api.enemredacoes.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.enemredacoes.app/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # HSTS — 1 year, include subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers (Node already sends most of these via Helmet)
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # Max request body (must match Express limit; images can be up to 15 MB encoded)
    client_max_body_size 20m;

    # Logging
    access_log /var/log/nginx/enem-backend-access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/enem-backend-error.log warn;

    # ── Health check (public, no rate limit — used by load balancer probes) ──
    location = /health {
        proxy_pass http://enem_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ── Auth endpoints (tight rate limit — brute-force protection) ────────────
    location ~ ^/(v1/)?auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        include /etc/nginx/conf.d/proxy_params.conf;
        proxy_pass http://enem_backend;
    }

    # ── AI correction (expensive — extra tight limit) ─────────────────────────
    location ~ ^/(v1/)?openai/correct-essay {
        limit_req zone=correction burst=3 nodelay;
        limit_req_status 429;
        proxy_read_timeout 150s;    # OpenAI can take up to 120s
        include /etc/nginx/conf.d/proxy_params.conf;
        proxy_pass http://enem_backend;
    }

    # ── Everything else ───────────────────────────────────────────────────────
    location / {
        limit_req zone=api_global burst=20 nodelay;
        limit_conn per_ip 30;
        limit_req_status 429;
        include /etc/nginx/conf.d/proxy_params.conf;
        proxy_pass http://enem_backend;
    }
}
