name: Deploy

on:
  push:
    branches: [main]

# Only one deploy at a time — cancel any in-progress run if a new push arrives
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  test:
    name: Tests (required before deploy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test
        env:
          NODE_ENV: test

  deploy:
    name: Deploy to DigitalOcean
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── 1. Bundle backend ────────────────────────────────────────────────────
      - name: Package backend
        run: |
          tar -czf backend.tar.gz \
            --exclude='backend/node_modules' \
            --exclude='backend/data' \
            --exclude='backend/*.tar.gz' \
            backend/

      # ── 2. Upload to droplet ─────────────────────────────────────────────────
      - name: Upload package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: backend.tar.gz
          target: /tmp/

      # ── 3. Deploy + health check ─────────────────────────────────────────────
      - name: Deploy and verify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e

            echo "=== Extracting ==="
            tar -xzf /tmp/backend.tar.gz -C /opt/enem-ia/

            echo "=== Installing dependencies ==="
            cd /opt/enem-ia/backend
            npm ci --omit=dev

            echo "=== Reloading PM2 (zero-downtime) ==="
            pm2 reload ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs

            echo "=== Health check ==="
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3333/health)
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed (attempt $i)"
                break
              fi
              if [ $i -eq 5 ]; then
                echo "Health check FAILED after 5 attempts — rolling back"
                pm2 reload ecosystem.config.cjs --update-env
                exit 1
              fi
              echo "Attempt $i failed (HTTP $STATUS), retrying in 5s..."
              sleep 5
            done

            echo "=== Deploy complete ==="
            pm2 status

      # ── 4. Notify on failure ─────────────────────────────────────────────────
      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Deploy failed. Check the logs above."
